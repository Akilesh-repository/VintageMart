<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Client Registration | VintageMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="images\vector-design-vintage-shop-icon-style_822882-413394.avif">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CORE STYLES & VARIABLES
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* STRICT NO SCROLL LOCK */
        html, body { 
            height: 100vh !important; 
            width: 100vw !important;
            overflow: hidden !important; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }

        /* === VintageMart THEME VARIABLES === */
        :root {
            --bg-page: #F0EFEA; 
            --bg-form: #FFFFFF; 
            
            --form-text: #2C2A29;
            --form-muted: #6B655F;
            --input-bg: #FAFAF7;
            --input-text: #2C2A29;
            --input-icon: #6B655F;
            
            --btn-bg: #B8860B;
            --btn-text: #FFFFFF; 
            
            --accent-color: #B8860B; /* Dark Goldenrod */
            --accent-dark: #8B6508; 
            --border-color: #E6E4DD;
            --radius: 0px; /* Sharp edges for Vintage look */
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        /* DARK MODE */
        body.dark-mode {
            --bg-page: #1A1918; 
            --bg-form: #242220; 
            
            --form-text: #EAE8E3;
            --form-muted: #A39E98;
            --input-bg: #1A1918;
            --input-text: #EAE8E3;
            --input-icon: #A39E98;
            
            --btn-bg: #D4AF37;
            --btn-text: #1A1918;
            
            --accent-color: #D4AF37; /* Metallic Gold */
            --border-color: #383532;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }

        body { 
            background-color: var(--bg-page);
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtle Warm Ambient Glows */
        .bg-glow-1 {
            position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(184, 134, 11, 0.08) 0%, transparent 60%);
            border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(60px);
        }
        .bg-glow-2 {
            position: absolute; bottom: -10%; right: -10%; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(139, 101, 8, 0.05) 0%, transparent 60%);
            border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(60px);
        }
        body.dark-mode .bg-glow-1 { background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 60%); }
        body.dark-mode .bg-glow-2 { background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 60%); }

        /* TOP RIGHT CONTROLS */
        .top-right-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }

        /* RTL SUPPORT */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
        [dir="rtl"] .mr-3 { margin-left: 0.75rem; margin-right: 0; }
        [dir="rtl"] .input-icon { left: auto; right: 16px; }
        [dir="rtl"] .input-field { padding: clamp(8px, 2vh, 12px) 44px clamp(8px, 2vh, 12px) 16px !important; }
        [dir="rtl"] .input-field.has-eye { padding: clamp(8px, 2vh, 12px) 44px clamp(8px, 2vh, 12px) 44px !important; }
        [dir="rtl"] .btn-icon { margin-left: 0; margin-right: 8px; transform: rotate(180deg); }
        [dir="rtl"] .top-right-controls { right: auto; left: 20px; }
        [dir="rtl"] .password-toggle-icon { right: auto; left: 16px; }

        /* REGISTRATION CARD */
        .login-card {
            background-color: var(--bg-form);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            border-radius: var(--radius);
            padding: clamp(1.2rem, 3vh, 2rem) 2rem;
            width: 90%;
            max-width: 400px;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vh, 16px); 
            position: relative;
            z-index: 10;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        
        /* Custom scrollbar for the card if it overflows on very small devices */
        .login-card::-webkit-scrollbar { width: 4px; }
        .login-card::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* HEADERS */
        .auth-logo { text-align: center; margin-bottom: 2px; }
        .auth-logo a { font-family: serif; color: var(--accent-color); }
        .auth-header { text-align: center; }
        .auth-header h2 { font-family: serif; font-size: clamp(1.3rem, 2.5vh, 1.6rem); font-weight: 400; color: var(--form-text); margin-bottom: 2px; letter-spacing: -0.5px; }
        .auth-header p { font-size: clamp(0.7rem, 1.6vh, 0.8rem); color: var(--form-muted); margin: 0; font-weight: 400; }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.8vh, 12px); 
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .form-group label { font-size: 0.65rem; font-weight: 700; color: var(--form-text); margin: 0; text-transform: uppercase; letter-spacing: 1px; padding-left: 4px; }
        
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--input-icon); font-size: 0.85rem; transition: color 0.3s; pointer-events: none; }
        
        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--input-icon);
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 2;
        }

        .password-toggle-icon:hover { color: var(--accent-color); }

        .input-field {
            width: 100%;
            padding: clamp(8px, 1.8vh, 12px) 16px clamp(8px, 1.8vh, 12px) 44px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--input-text);
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0;
        }
        
        .input-field.has-eye {
            padding-right: 44px; /* Ensure text doesn't flow under the eye icon */
        }

        .input-field::placeholder { color: var(--input-icon); opacity: 0.7; font-weight: 400; }
        .input-field:focus { 
            outline: none; 
            border-color: var(--accent-color); 
            background-color: var(--bg-form);
        }
        .input-field:focus + .input-icon, 
        .input-field:focus ~ .input-icon { 
            color: var(--accent-color); 
        }

        .utility-row {
            display: flex;
            align-items: center;
            margin: 2px 0;
            padding: 0 4px;
        }

        input[type="checkbox"] {
            width: 12px;
            height: 12px;
            border-radius: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        /* BUTTONS */
        .auth-btn {
            width: 100%; 
            padding: clamp(10px, 2vh, 12px);
            background-color: var(--btn-bg);
            color: var(--btn-text); 
            border: 1px solid var(--accent-color); 
            border-radius: var(--radius);
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; transition: all 0.3s;
            margin-top: 2px;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-btn:hover { 
            background-color: var(--accent-dark);
            border-color: var(--accent-dark);
            color: #FFFFFF;
        }
        body.dark-mode .auth-btn:hover {
            background-color: transparent;
            color: var(--accent-color);
        }

        /* DIVIDER */
        .divider { text-align: center; position: relative; margin: 2px 0; }
        .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: var(--border-color); }
        .divider span { position: relative; background: var(--bg-form); padding: 0 12px; color: var(--form-text); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* MINIMAL SOCIALS */
        .social-login { display: flex; justify-content: center; gap: 12px; }
        .social-btn {
            width: 40px; height: 40px;
            border: 1px solid var(--border-color); 
            border-radius: 0; 
            background-color: var(--bg-form);
            font-size: 0.9rem; color: var(--form-text);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { 
            border-color: var(--accent-color);
            background-color: var(--accent-color);
            color: #FFFFFF;
        }
        body.dark-mode .social-btn:hover {
            color: var(--bg-page);
        }

        /* FOOTER LINKS */
        .login-link { text-align: center; font-size: 0.75rem; color: var(--form-muted); font-weight: 400; margin-top: 4px; }
        .login-link a { color: var(--accent-color); font-weight: 700; text-decoration: none; border-bottom: 1px solid transparent; transition: all 0.3s; }
        .login-link a:hover { border-bottom-color: var(--accent-color); }

        /* CONTROLS TOGGLE STYLES */
        .toggle { width: 40px; height: 20px; background: transparent; border: 1px solid var(--form-text); border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .toggle::before { content: ''; position: absolute; width: 12px; height: 12px; background: var(--form-text); border-radius: 50%; top: 3px; left: 4px; transition: 0.3s; }
        body.dark-mode .toggle { border-color: var(--form-text); }
        body.dark-mode .toggle::before { left: 22px; background: var(--accent-color); }
        
        .btn-text { font-size: 0.6rem; font-weight: 700; color: var(--form-text); background: transparent; border: 1px solid var(--form-text); padding: 4px 10px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-text:hover { color: var(--accent-color); border-color: var(--accent-color); }


        /* =========================================
           ULTRA-COMPACT MOBILE & LANDSCAPE TABLET (1024x600) OPTIMIZATIONS 
           ========================================= */
        @media (max-width: 400px) {
            .login-card { padding: 1.2rem 1.5rem !important; gap: 10px !important; width: 92%; }
            .auth-logo { margin-bottom: 0 !important; }
            .auth-header h2 { font-size: 1.2rem !important; margin-bottom: 0 !important; }
            .auth-header p { display: none !important; } 
            
            form { gap: 8px !important; }
            .form-group { gap: 2px !important; }
            .form-group label { font-size: 0.6rem !important; }
            .input-field { padding: 8px 12px 8px 36px !important; font-size: 0.75rem !important; height: 38px !important; }
            .input-field.has-eye { padding: 8px 36px 8px 36px !important; }
            .input-icon { font-size: 0.8rem !important; left: 12px !important; }
            .password-toggle-icon { font-size: 0.8rem !important; right: 12px !important; }
            [dir="rtl"] .input-field { padding: 8px 36px 8px 12px !important; }
            [dir="rtl"] .input-field.has-eye { padding: 8px 36px 8px 36px !important; }
            [dir="rtl"] .input-icon { right: 12px !important; left: auto !important; }
            [dir="rtl"] .password-toggle-icon { right: auto !important; left: 12px !important; }
            
            .utility-row { margin: 0 !important; }
            .utility-row span { font-size: 0.6rem !important; }
            
            .auth-btn { height: 38px !important; padding: 0 !important; font-size: 0.7rem !important; margin-top: 0 !important; }
            .social-btn { width: 36px !important; height: 36px !important; font-size: 0.85rem !important; }
            .login-link { font-size: 0.65rem !important; margin-bottom: 0 !important; margin-top: 0 !important;}
        }

        /* SPECIFIC FIX FOR SHORT SCREENS (e.g. 1024x600 tablet landscape) */
        @media (max-height: 650px) {
            .login-card { 
                gap: 6px !important; 
                padding: 12px 20px !important; 
                max-height: 98vh !important;
                overflow-y: hidden !important; /* Force remove scrollbar */
            }
            .auth-logo { margin-bottom: 0 !important; }
            .auth-logo a { font-size: 1.2rem !important; }
            .auth-header h2 { font-size: 1.1rem !important; margin-bottom: 0 !important; }
            .auth-header p { display: none !important; } 
            
            form { gap: 6px !important; }
            .form-group { gap: 0px !important; }
            .form-group label { font-size: 0.55rem !important; margin-bottom: 2px !important; }
            
            .input-field { padding: 6px 10px 6px 30px !important; font-size: 0.7rem !important; height: 32px !important; border-radius: 0 !important; }
            .input-field.has-eye { padding: 6px 30px 6px 30px !important; }
            .input-icon { left: 10px !important; font-size: 0.7rem !important; }
            .password-toggle-icon { right: 10px !important; font-size: 0.7rem !important; }
            [dir="rtl"] .input-field { padding: 6px 30px 6px 10px !important; }
            [dir="rtl"] .input-field.has-eye { padding: 6px 30px 6px 30px !important; }
            [dir="rtl"] .input-icon { right: 10px !important; left: auto !important; }
            [dir="rtl"] .password-toggle-icon { right: auto !important; left: 10px !important; }
            
            .utility-row { margin: 0 !important; }
            .utility-row span { font-size: 0.55rem !important; }
            .utility-row a { font-size: 0.55rem !important; }
            input[type="checkbox"] { width: 10px !important; height: 10px !important; }
            
            .auth-btn { height: 32px !important; font-size: 0.65rem !important; margin-top: 0 !important; padding: 0 !important; }
            
            .divider { margin: 2px 0 !important; }
            .divider span { font-size: 0.6rem !important; padding: 0 8px !important; }
            
            .social-login { gap: 8px !important; }
            .social-btn { width: 30px !important; height: 30px !important; font-size: 0.75rem !important; }
            
            .login-link { font-size: 0.6rem !important; margin-top: 0 !important; }
            .top-right-controls { top: 10px; right: 10px; }
            [dir="rtl"] .top-right-controls { left: 10px; right: auto; }
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <!-- MOVED TO TOP RIGHT -->
    <div class="top-right-controls">
        <div class="flex items-center gap-2" style="cursor: pointer;" onclick="document.getElementById('theme-toggle').click()">
            <i class="fas fa-sun text-[10px]" style="color: var(--form-text);"></i>
            <div class="toggle" id="theme-toggle"></div>
            <i class="fas fa-moon text-[10px]" style="color: var(--form-text);"></i>
        </div>
        <button id="rtl-toggle" class="btn-text">LTR / RTL</button>
    </div>

    <div class="login-card">

        <div class="auth-logo">
            <a href="index.html" class="text-2xl lg:text-3xl font-black tracking-tighter" style="text-decoration: none;">
                VintageMart
            </a>
        </div>

        <div class="auth-header">
            <h2>Join the Registry</h2>
            <p>Create your private collector account.</p>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" class="input-field" placeholder="John Doe" required>
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="input-field" placeholder="collector@example.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="input-field has-eye" placeholder="••••••••" required>
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye password-toggle-icon" id="togglePassword"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" class="input-field has-eye" placeholder="••••••••" required>
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye password-toggle-icon" id="toggleConfirmPassword"></i>
                </div>
            </div>

            <div class="utility-row">
                <label class="flex items-start sm:items-center cursor-pointer mt-1 mb-1">
                    <input type="checkbox" class="flex-shrink-0 cursor-pointer mt-0.5 sm:mt-0" required>
                    <span class="ml-2 text-[10px] sm:text-xs font-semibold" style="color: var(--form-text);">
                        I agree to the <a href="#" style="color: var(--accent-color); text-decoration: underline; text-underline-offset: 2px;">Terms & Conditions</a>
                    </span>
                </label>
            </div>

            <button type="submit" class="auth-btn">Create Account <i class="fas fa-arrow-right ml-2 btn-icon"></i></button>
        </form>

        <div class="divider"><span>Or register with</span></div>

        <div class="social-login">
            <button class="social-btn" type="button" title="Sign up with Google"><i class="fab fa-google"></i></button>
            <button class="social-btn" type="button" title="Sign up with Apple"><i class="fab fa-apple"></i></button>
            <button class="social-btn" type="button" title="Sign up with Facebook"><i class="fab fa-facebook-f"></i></button>
        </div>

        <div class="login-link">
            Already a member? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        // --- PASSWORD REVEAL LOGIC ---
        function setupPasswordToggle(toggleId, inputId) {
            const toggleElement = document.getElementById(toggleId);
            const inputElement = document.getElementById(inputId);
            
            toggleElement.addEventListener('click', function () {
                const type = inputElement.getAttribute('type') === 'password' ? 'text' : 'password';
                inputElement.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }

        setupPasswordToggle('togglePassword', 'password');
        setupPasswordToggle('toggleConfirmPassword', 'confirm-password');

        // --- THEME LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.classList.add('active');
        }

        themeToggle.onclick = (e) => {
            e.stopPropagation(); 
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.classList.toggle('active', isDark);
        };

        // --- RTL LOGIC ---
        const rtlToggle = document.getElementById('rtl-toggle');
        const savedDir = localStorage.getItem('dir') || 'ltr';
        
        if (savedDir === 'rtl') {
            document.documentElement.dir = 'rtl';
        }

        rtlToggle.onclick = () => {
            const isRTL = document.documentElement.dir === 'rtl';
            document.documentElement.dir = isRTL ? 'ltr' : 'rtl';
            localStorage.setItem('dir', isRTL ? 'ltr' : 'rtl');
        };

        // --- FORM SUBMISSION ---
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // Redirect to login page after successful registration
            window.location.href = 'login.html'; 
        });

        // Social Buttons Alert
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                alert('Social registration integration required.');
            });
        });
    </script>
</body>
</html>
